<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- SEO -->
    <title>Renu Eye Care Centre | NABH Accredited Eye Hospital</title>
    <meta name="description" content="Renu Eye Care Centre — 25+ years of compassionate, advanced eye care. Bladeless LASIK, cataract surgery, retina treatment & more. Book your appointment today." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Renu Eye Care Centre | NABH Accredited Eye Hospital" />
    <meta property="og:description" content="25+ years of compassionate, advanced eye care. Bladeless LASIK, cataract surgery, retina treatment & more." />
    <meta property="og:image" content="/571104a1-a004-4f20-8bf3-70a83dd8a4c1.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Renu Eye Care Centre" />
    <meta name="twitter:description" content="25+ years of advanced, compassionate eye care." />

    <!-- Preconnect to Google Fonts CDN — cuts DNS + TLS handshake from critical path -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/571104a1-a004-4f20-8bf3-70a83dd8a4c1.jpg" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
